[build-system]
requires = ["hatchling >= 1.26"]
build-backend = "hatchling.build"

[project]
name = "okf_converter"
authors = [
  {name = "Matthieu Daviaud", email = "matthieu.daviaud@gmail.com"},
]
version = "0.1.0"
description = "A short description of the project."
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
dependencies = [
    "beartype>=0.22.9",
    "pydantic-settings>=2.0",
]

[project.scripts]
okf_converter = "okf_converter.__main__:main"

[project.optional-dependencies]
dev = [
    "pytest-cov>=7.1.0",
]
docs = [
    "sphinx>=8.1.3",
    "sphinx-rtd-theme>=3.1.0",
]
lint = [
    "mypy>=2.1.0",
    "ruff>=0.15.18",
]

[tool.ruff]
target-version = "py310"
line-length = 88
indent-width = 4

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = []

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.pytest.ini_options]
testpaths = ["tests", "src/okf_converter"]
addopts = [
    "--doctest-modules",
    "--cov=src/okf_converter",
    "--cov-report=term-missing",
    "--cov-report=html",
]
pythonpath = ["."]

[tool.coverage.run]
source = ["src/okf_converter"]
branch = true

[tool.coverage.report]
fail_under = 80
show_missing = true
exclude_lines = [
    "if __name__ == .__main__.:",
    "pragma: no cover",
    "raise NotImplementedError",
]
skip_empty = true

[tool.mypy]
python_version = "3.10"
strict = true

[tool.hatch.build.targets.wheel]
packages = ["src/okf_converter"]

[tool.hatch.build.targets.wheel.force-include]
"src/okf_converter/py.typed" = "okf_converter/py.typed"

name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  validate:
    name: Lint + Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: |
          uv run ruff check src/
          uv run ruff format --check src/
          uv run python -m mypy src/

      - name: Tests
        run: uv run python -m pytest --cov=src/okflint --cov-fail-under=85

  publish:
    name: Build + Publish PyPI
    runs-on: ubuntu-latest
    needs: validate

    environment:
      name: pypi
      url: https://pypi.org/project/okflint/

    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Build sdist + wheel
        run: uv build

      - name: Verify the installed wheel without development dependencies
        run: |
          uv venv .wheel-venv
          uv pip install --python .wheel-venv/bin/python dist/*.whl
          uv pip check --python .wheel-venv/bin/python
          .wheel-venv/bin/okflint --help

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: publish

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

name: Docs

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    name: Build Sphinx + Deploy GitHub Pages
    runs-on: ubuntu-latest

    permissions:
      contents: write  # nécessaire pour pousser sur gh-pages

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies (with docs extras)
        run: uv sync --extra docs

      - name: Build Sphinx documentation
        run: |
          uv run sphinx-build -b html docs/sphinx docs/sphinx/_build/html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs/sphinx/_build/html/

name: Docs

on:
  push:
    branches: ["main"]

# Un seul déploiement à la fois — annule le précédent si un nouveau push arrive
concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build Sphinx + Deploy GitHub Pages
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies (with docs extras)
        run: uv sync --extra docs

      - name: Build Sphinx documentation
        run: |
          uv run sphinx-build -b html docs/code/sphinx docs/code/sphinx/_build/html
          # Fichier requis pour que GitHub Pages serve les dossiers _static/, _sources/, etc.
          touch docs/code/sphinx/_build/html/.nojekyll

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs/code/sphinx/_build/html/
